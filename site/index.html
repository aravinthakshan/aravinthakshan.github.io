<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A S Aravinthakshan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --ink: #1d1d1f;
            --ink-soft: #515154;
            --ink-muted: #86868b;
            --hairline: rgba(0, 0, 0, 0.08);
            --accent: #0a4a8a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        html, body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            letter-spacing: -0.011em;
        }

        .wrap {
            max-width: 720px;
            margin: 0 auto;
            padding: 3rem 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 2.5rem;
            border-bottom: 1px solid var(--hairline);
            margin-bottom: 6rem;
        }

        nav .brand {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--ink-muted);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: var(--ink);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 200ms ease;
        }

        nav a:hover { color: var(--accent); }
        nav a.active { color: var(--accent); }

        main { flex: 1; }

        h1.name {
            font-size: clamp(42px, 6vw, 68px);
            font-weight: 500;
            letter-spacing: -0.03em;
            line-height: 1.05;
            margin-bottom: 1.5rem;
        }

        h1.name em {
            font-family: 'Instrument Serif', serif;
            font-style: italic;
            font-weight: 400;
        }

        .role {
            font-size: 15px;
            color: var(--ink-muted);
            letter-spacing: 0.02em;
            margin-bottom: 2rem;
        }

        .bio {
            font-size: 18px;
            color: var(--ink-soft);
            max-width: 52ch;
            margin-bottom: 2.5rem;
            line-height: 1.55;
        }

        .bio strong { color: var(--ink); font-weight: 500; }

        .links {
            display: flex;
            gap: 1.5rem;
            font-size: 14px;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .links a {
            color: var(--ink-soft);
            text-decoration: none;
            border-bottom: 1px solid var(--hairline);
            padding-bottom: 2px;
            transition: color 200ms ease, border-color 200ms ease;
        }

        .links a:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        footer {
            margin-top: auto;
            padding-top: 3rem;
            border-top: 1px solid var(--hairline);
            font-size: 12px;
            color: var(--ink-muted);
            letter-spacing: 0.04em;
            display: flex;
            justify-content: space-between;
        }

        @media (max-width: 600px) {
            nav { margin-bottom: 4rem; }
            nav ul { gap: 1.25rem; }
            .wrap { padding: 2rem 1.25rem; }
        }
    </style>
</head>
<body>
<div class="wrap">

    <nav>
        <div class="brand">Aravinthakshan</div>
        <ul>
            <li><a href="/" class="active">Home</a></li>
            <li><a href="/projects.html">Projects</a></li>
        </ul>
    </nav>

    <main>
        <h1 class="name">A S <em>Aravinthakshan</em></h1>
        <div class="role">Manipal Institute of Technology</div>
        <p class="bio">
            Software developer and <strong>AI researcher</strong>. Working on graph representation learning, self-supervised methods, and applied machine learning systems.
        </p>

        <div class="links">
            <a href="/projects.html">Projects</a>
            <a href="https://github.com/aravinthakshan" target="_blank" rel="noopener">GitHub</a>
            <a href="mailto:aravinthakshan@example.com">Email</a>
        </div>
    </main>

    <footer>
        <span>© 2026 Aravinthakshan</span>
        <span>Manipal · India</span>
    </footer>

</div>
</body>
</html>
